name: metronome_app
description: "Standalone Metronome with Firebase Sync"
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # State Management
  flutter_riverpod: ^2.6.1
  
  # Navigation
  go_router: ^14.8.0
  
  # Firebase (ОБНОВЛЕНО ДО 4.x/6.x)
  firebase_core: ^4.2.1
  firebase_auth: ^6.0.2
  cloud_firestore: ^6.0.2
  
  # Audio
  audioplayers: ^6.4.0
  just_audio_web: ^0.4.16
  
  # Persistence & Utils
  shared_preferences: ^2.5.4
  json_annotation: ^4.9.0
  web: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/audio/
