name: metronome_app
description: "Standalone Metronome with Firebase Sync"
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.8
  
  # State Management (latest 2.x - 3.x requires migration)
  flutter_riverpod: ^2.6.1
  
  # Navigation (latest 14.x)
  go_router: ^14.8.1
  
  # Firebase (latest versions)
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  
  # Audio
  audioplayers: ^6.4.0
  
  # Persistence & Utils
  shared_preferences: ^2.5.4
  json_annotation: ^4.9.0
  web: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

  assets:
    - assets/audio/
