name: metronome_app
description: "Standalone Metronome with Firebase Sync"
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.8
  
  # State Management (latest 3.x)
  flutter_riverpod: ^3.0.3
  riverpod_annotation: ^3.0.3
  
  # Navigation (latest 17.x)
  go_router: ^17.1.0
  
  # Firebase (latest versions)
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  
  # Audio
  audioplayers: ^6.4.0

  # Haptic Feedback

  # Persistence & Utils
  shared_preferences: ^2.5.4
  json_annotation: ^4.9.0
  web: ^1.1.0

  # Environment Variables (Security)
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  riverpod_generator: ^3.0.3
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/audio/
